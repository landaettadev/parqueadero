<div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(160deg, #000033 0%, #000066 40%, #0040a0 100%); padding: 24px; position: relative; overflow: hidden;">
  <!-- Background decoration -->
  <div style="position: absolute; top: -100px; right: -100px; width: 300px; height: 300px; border-radius: 50%; background: rgba(255,255,255,0.03);"></div>
  <div style="position: absolute; bottom: -80px; left: -80px; width: 250px; height: 250px; border-radius: 50%; background: rgba(255,255,255,0.02);"></div>

  <div style="width: 100%; max-width: 400px; animation: fadeIn 0.5s ease;">
    <!-- Login Card -->
    <div style="background: white; border-radius: 24px; padding: 36px 28px; box-shadow: 0 24px 64px rgba(0,0,0,0.3);">
      <!-- Logo dentro del formulario -->
      <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 28px; padding: 0 16px;">
        <img src="logo.png" alt="Smart Parking EAFIT"
             style="display: block; width: 100%; max-width: 220px; height: auto; object-fit: contain;" />
      </div>
      <h2 style="font-size: 22px; font-weight: 800; color: #1a1a2e; margin: 0 0 6px; text-align: center;">Iniciar Sesion</h2>
      <p style="font-size: 13px; color: #9ca3af; margin: 0 0 28px; text-align: center;">Ingresa con tu correo institucional</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Email -->
        <div style="margin-bottom: 16px;">
          <label style="font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 6px;">Correo institucional</label>
          <div style="position: relative;">
            <span class="mi" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #9ca3af;">mail</span>
            <input type="email" formControlName="email" placeholder="usuario&#64;eafit.edu.co"
                   style="width: 100%; padding: 14px 16px 14px 44px; border: 2px solid #e5e7eb; border-radius: 14px; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; box-sizing: border-box;" />
          </div>
        </div>

        <!-- Password -->
        <div style="margin-bottom: 24px;">
          <label style="font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 6px;">Contrasena</label>
          <div style="position: relative;">
            <span class="mi" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #9ca3af;">lock</span>
            <input type="password" formControlName="password" placeholder="Tu contrasena"
                   style="width: 100%; padding: 14px 16px 14px 44px; border: 2px solid #e5e7eb; border-radius: 14px; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; box-sizing: border-box;" />
          </div>
        </div>

        <!-- Error -->
        @if (errorMessage()) {
          <div style="padding: 12px 16px; background: #fef2f2; border-radius: 12px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
            <span class="mi" style="font-size: 18px; color: #ef4444;">error</span>
            <span style="font-size: 13px; color: #991b1b;">{{ errorMessage() }}</span>
          </div>
        }

        <!-- Submit -->
        <button type="submit" [disabled]="isLoading()"
                style="width: 100%; padding: 16px; background: #000066; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;">
          @if (isLoading()) {
            <div style="width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            Ingresando...
          } @else {
            <span class="mi" style="font-size: 20px;">login</span>
            Ingresar
          }
        </button>
      </form>
    </div>

    <!-- Test credentials -->
    <div style="margin-top: 24px; text-align: center;">
      <p style="font-size: 12px; color: rgba(255,255,255,0.4); margin: 0 0 6px;">Credenciales de prueba</p>
      <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin: 0;">
        <span style="background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px;">user&#64;eafit.edu.co</span>
        /
        <span style="background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px;">123456</span>
      </p>
    </div>
  </div>
</div>
