<div class="bg-white rounded-xl shadow-md hover:shadow-lg transition-shadow p-6 border-l-4" 
     [ngClass]="statusColor()">
  
  <!-- Header -->
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-2xl font-bold text-gray-800">{{ zone() }}</h3>
    <span class="px-3 py-1 rounded-full text-sm font-semibold text-white"
          [ngClass]="statusColor()">
      {{ statusText() }}
    </span>
  </div>

  <!-- Stats -->
  <div class="space-y-3">
    <!-- Available / Total -->
    <div class="flex items-center justify-between">
      <span class="text-gray-600">Disponibles:</span>
      <span class="text-2xl font-bold text-eafit-primary">
        {{ available() }} / {{ total() }}
      </span>
    </div>

    <!-- Progress Bar -->
    <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
      <div class="h-full transition-all duration-500 rounded-full"
           [ngClass]="statusColor()"
           [style.width.%]="availablePercentage()">
      </div>
    </div>

    <!-- Percentage -->
    <div class="text-center">
      <span class="text-sm text-gray-500">
        {{ availablePercentage() }}% disponible
      </span>
    </div>
  </div>

  <!-- Icon -->
  <div class="mt-4 flex justify-center">
    <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
    </svg>
  </div>
</div>
